settings:
  india_limit: 32
  world_limit: 42

  # Total points in the final post. The page must never render more than five.
  final_points_total: 5
  max_groups_per_section: 8
  min_group_score: 2

  require_ist_today: true
  max_age_hours: 36
  allow_unknown_dates: false

  # Signals used before the AI call. Edit these to tune what is considered
  # useful for classroom discussion and research-direction awareness.
  india_keywords: >-
    india,indian,isro,iit,iisc,tifr,rri,prl,bose institute,saha institute,
    iiser,ugc,inspire,dst,serb,barc,dae,iuac,aries,ncbs,niser,vecc,
    indian institute of science,indian institute of technology

  world_keywords: >-
    physics,quantum,particle,cosmology,astrophysics,astronomy,gravitational,
    nuclear,condensed matter,materials,plasma,semiconductor,superconduct,
    photonics,neutrino,lhc,cern,nasa,esa,fermi lab,fermilab,brookhaven,
    synchrotron,laser,detector,telescope

  research_keywords: >-
    discovery,experiment,measurement,observed,observation,detected,detection,
    breakthrough,research,study,paper,preprint,nature,science,physical review,
    quantum,particle,condensed matter,materials,astronomy,astrophysics,
    cosmology,nuclear,plasma,photonics,superconduct,semiconductor,neutrino,
    gravitational wave,dark matter,exoplanet,telescope,mission,launch,
    detector,accelerator

  physics_topic_keywords: >-
    physics,quantum,qubit,particle,astronomy,astrophysics,cosmology,
    condensed matter,materials,space,mission,satellite,telescope,aerospace,
    gravitational,detector,accelerator,superconduct,semiconductor,plasma,
    nuclear,neutrino,dark matter,chandrayaan,aditya-l1,astrosat,gaganyaan

  classroom_keywords: >-
    explain,why it matters,student,education,lecture,nobel,olympiad,
    demonstration,concept,experiment,measurement,question

  low_value_keywords: >-
    opinion,editorial,podcast,quiz,photo gallery,web story,celebrity,
    movie,astrology,horoscope,gadget sale,deal,ranking list,admission notice,
    memoir,book launch,wellness wear,pharmacopoeia,road infrastructure,
    anniversary,history,historic,space dream,bullock cart

  exclude_keywords: >-
    astrology,horoscope,photo gallery,photos,web story,viral video,recipe,
    movie,box office,celebrity,stock market,crypto,lottery,football,cricket,
    yoga day,wellness wear,pharmacopoeia,book launch,memoir,admissions open,
    admission open,submit your moon joy,art to nasa

